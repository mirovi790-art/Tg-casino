<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Casino Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .profile { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .balance { font-size: 24px; color: #4CAF50; font-weight: bold; }
        .slot-container { background: #222; border: 2px solid #444; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .reels { font-size: 40px; margin-bottom: 15px; letter-spacing: 10px; }
        button { background: #0088cc; border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #555; }
        .game-title { font-size: 18px; margin-bottom: 10px; color: #aaa; }
    </style>
</head>
<body>

    <div class="profile">
        <div id="username">–Ш–≥—А–Њ–Ї</div>
        <div class="balance">рЯТ∞ <span id="balance">1000</span></div>
    </div>

    <!-- –Т–Є–і 1: –§—А—Г–Ї—В—Л -->
    <div class="slot-container">
        <div class="game-title">Classic Fruits (–°—В–∞–≤–Ї–∞: 10)</div>
        <div class="reels" id="reels1">рЯНТрЯНЛрЯНЙ</div>
        <button onclick="playSlot(1, 10, ['рЯНТ', 'рЯНЛ', 'рЯНЙ', 'рЯНЗ', 'рЯФФ'])">–Ъ—А—Г—В–Є—В—М</button>
    </div>

    <!-- –Т–Є–і 2: –Я–Є—А–∞—В—Л -->
    <div class="slot-container">
        <div class="game-title">Pirate Treasure (–°—В–∞–≤–Ї–∞: 50)</div>
        <div class="reels" id="reels2">вЪУпЄПрЯПівАНвШ†пЄПрЯТО</div>
        <button onclick="playSlot(2, 50, ['вЪУпЄП', 'рЯПівАНвШ†пЄП', 'рЯТО', 'рЯТ∞', 'вЪФпЄП'])">–Ъ—А—Г—В–Є—В—М</button>
    </div>

    <!-- –Т–Є–і 3: –Ъ–Њ—Б–Љ–Њ—Б -->
    <div class="slot-container">
        <div class="game-title">Space Gems (–°—В–∞–≤–Ї–∞: 100)</div>
        <div class="reels" id="reels3">рЯЪАрЯЫЄрЯ™Р</div>
        <button onclick="playSlot(3, 100, ['рЯЪА', 'рЯЫЄ', 'рЯ™Р', 'рЯММ', 'в≠Р'])">–Ъ—А—Г—В–Є—В—М</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // –†–∞–Ј–≤–µ—А–љ—Г—В—М –љ–∞ –≤–µ—Б—М —Н–Ї—А–∞–љ

        let balance = parseInt(localStorage.getItem('balance')) || 1000;
        document.getElementById('balance').innerText = balance;
        document.getElementById('username').innerText = tg.initDataUnsafe.user?.first_name || "–У–Њ—Б—В—М";

        function playSlot(id, cost, symbols) {
            if (balance < cost) {
                alert("–Э–µ–і–Њ—Б—В–∞—В–Њ—З–љ–Њ –Љ–Њ–љ–µ—В!");
                return;
            }

            balance -= cost;
            updateBalance();

            const reelDisplay = document.getElementById('reels' + id);
            let results = [];
            
            // –Р–љ–Є–Љ–∞—Ж–Є—П "–Ї—А—Г—В–Є–ї–Ї–Є"
            let count = 0;
            let interval = setInterval(() => {
                results = [
                    symbols[Math.floor(Math.random() * symbols.length)],
                    symbols[Math.floor(Math.random() * symbols.length)],
                    symbols[Math.floor(Math.random() * symbols.length)]
                ];
                reelDisplay.innerText = results.join('');
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    checkWin(results, cost);
                }
            }, 50);
        }

        function checkWin(results, cost) {
            // –Х—Б–ї–Є –≤—Б–µ —В—А–Є —Б–Є–Љ–≤–Њ–ї–∞ —Б–Њ–≤–њ–∞–ї–Є
            if (results[0] === results[1] && results[1] === results[2]) {
                let winAmount = cost * 10;
                balance += winAmount;
                alert("–Ф–Ц–Х–Ъ–Я–Ю–Ґ! –Т—Л –≤—Л–Є–≥—А–∞–ї–Є " + winAmount);
            } 
            // –Х—Б–ї–Є —Б–Њ–≤–њ–∞–ї–Є —В–Њ–ї—М–Ї–Њ –і–≤–∞
            else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
                let winAmount = Math.floor(cost * 1.5);
                balance += winAmount;
            }
            updateBalance();
        }

        function updateBalance() {
            document.getElementById('balance').innerText = balance;
            localStorage.setItem('balance', balance);
        }
    </script>
</body>
</html>
